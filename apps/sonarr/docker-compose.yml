include:
  - ../networks.yml
services:
  sonarr:
    extends:
      file: ../common.yml
      service: main
    image: ghcr.io/hotio/sonarr
    environment:
      TZ: ${DAPPS_TIMEZONE}
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ${QBITTORRENT_DOWNLOADS_PATH}:/downloads
      - ${JELLYFIN_SHOWS_PATH}:/shows
