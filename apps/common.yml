services:
  main:
    env_file:
      - ./${APP_NAME}/.env
    restart: unless-stopped
    expose:
      - ${APP_PORT}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${APP_NAME}.${DAPPS_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}.tls.certresolver=${DAPPS_CERTIFICATE_RESOLVER}"
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=${APP_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:${APP_PORT} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - internal
      - traefik
  side:
    env_file:
      - ./${APP_NAME}/.env
    restart: unless-stopped
    networks:
      - internal
