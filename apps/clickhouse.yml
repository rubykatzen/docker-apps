services:
  clickhouse:
    image: clickhouse/clickhouse-server:24
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${APP_NAME}
      CLICKHOUSE_USER: ${APP_NAME}
      CLICKHOUSE_PASSWORD: ${DAPPS_DATABASE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ../apps-data/${APP_NAME}/clickhouse/data:/var/lib/clickhouse
      - ../apps-data/${APP_NAME}/clickhouse/logs:/var/log/clickhouse-server
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user=${APP_NAME} --password=${DAPPS_DATABASE_PASSWORD} --query 'SELECT 1'",
        ]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/clickhouse-server/config.d/custom.xml << EOF
        <clickhouse>
          <logger>
            <level>warning</level>
            <console>true</console>
          </logger>
          <keep_alive_timeout>10</keep_alive_timeout>
          <query_thread_log remove="remove"/>
          <query_log remove="remove"/>
          <text_log remove="remove"/>
          <trace_log remove="remove"/>
          <metric_log remove="remove"/>
          <asynchronous_metric_log remove="remove"/>
          <session_log remove="remove"/>
          <part_log remove="remove"/>
          <listen_host>0.0.0.0</listen_host>
          <macros>
            <cluster>${APP_NAME}</cluster>
          </macros>
          <remote_servers>
            <${APP_NAME}>
              <shard>
                <internal_replication>false</internal_replication>
                <replica>
                  <host>clickhouse</host>
                  <port>9000</port>
                </replica>
              </shard>
            </${APP_NAME}>
          </remote_servers>
          <zookeeper>
            <node>
              <host>localhost</host>
              <port>2181</port>
            </node>
          </zookeeper>
        </clickhouse>
        EOF
        /entrypoint.sh
    networks:
      - internal
