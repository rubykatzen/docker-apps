include:
  - ../networks.yml
  - ../postgres.yml
x-environment: &environment
  SEMAPHORE_ACCESS_KEY_ENCRYPTION: ${DAPPS_KEY_HEX_16}
  SEMAPHORE_DB_DIALECT: postgres
  SEMAPHORE_DB_HOST: postgres
  SEMAPHORE_DB_NAME: ${APP_NAME}
  SEMAPHORE_DB_USER: ${APP_NAME}
  SEMAPHORE_DB_PASS: ${DAPPS_DATABASE_PASSWORD}
  SEMAPHORE_ADMIN: admin
  SEMAPHORE_ADMIN_PASSWORD: ${DAPPS_ADMIN_DEFAULT_PASS}
  SEMAPHORE_ADMIN_NAME: admin
  SEMAPHORE_ADMIN_EMAIL: ${DAPPS_ADMIN_MAIL}
  SEMAPHORE_TELEGRAM_ALERT: "True"
  SEMAPHORE_TELEGRAM_TOKEN: ${DAPPS_TELEGRAM_TELEGRAM_TOKEN}
  SEMAPHORE_TELEGRAM_CHAT: ${DAPPS_TELEGRAM_CHAT}
  ANSIBLE_HOST_KEY_CHECKING: "False"
services:
  semaphore:
    extends:
      file: ../common.yml
      service: main
    image: semaphoreui/semaphore
    depends_on:
      - postgres
    environment: *environment
