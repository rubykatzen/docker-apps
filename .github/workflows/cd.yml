name: CD
on:
  push:
    branches: [ 'main' ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          use-cache: 'true'
      - name: Create .env
        uses: SpicyPizza/create-envfile@v2.0
        with:
          envkey_DAPPS_ADMIN_MAIL: '${{ vars.DAPPS_ADMIN_MAIL }}'
          envkey_DAPPS_ADMIN_DEFAULT_PASS: "${{ secrets.DAPPS_ADMIN_DEFAULT_PASS }}"
          envkey_DAPPS_CLOUDFLARE_DNS_API_TOKEN: ${{ secrets.DAPPS_CLOUDFLARE_DNS_API_TOKEN }}
          envkey_DAPPS_TIMEZONE: ${{ vars.DAPPS_TIMEZONE }}
          envkey_DAPPS_DAPPS_DATABASE_PASSWORD: ${{ secrets.DAPPS_DATABASE_PASSWORD }}
          envkey_DAPPS_KEY_HEX_16: ${{ secrets.DAPPS_KEY_HEX_16 }}
          envkey_DAPPS_KEY_HEX_32: ${{ secrets.DAPPS_KEY_HEX_32 }}
          envkey_DAPPS_KEY_HEX_64: ${{ secrets.DAPPS_KEY_HEX_64 }}
          envkey_DAPPS_KEY_BASE64_32: ${{ secrets.DAPPS_KEY_BASE64_32 }}
          envkey_DAPPS_TELEGRAM_TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TELEGRAM_TOKEN }}
          envkey_DAPPS_TELEGRAM_CHAT: ${{ vars.DAPPS_TELEGRAM_CHAT }}
          envkey_DAPPS_SHOUTRRR_TELEGRAM_NOTIFICATION_URL: ${{ secrets.DAPPS_SHOUTRRR_TELEGRAM_NOTIFICATION_URL }}
          envkey_DAPPS_HTPASSWD: ${{ secrets.DAPPS_HTPASSWD }}
          envkey_BESZEL_AGENT_PUBLIC_KEY: ${{ vars.BESZEL_AGENT_PUBLIC_KEY }}
          envkey_RSSHUB_ACCESS_KEY: ${{ secrets.RSSHUB_ACCESS_KEY }}
          envkey_RSSHUB_TWITTER_AUTH_TOKEN: ${{ secrets.RSSHUB_TWITTER_AUTH_TOKEN }}
          envkey_RSSHUB_YOUTUBE_KEY: ${{ secrets.RSSHUB_YOUTUBE_KEY }}
          envkey_RSSHUB_MEDIUM_CONFIG: ${{ secrets.RSSHUB_MEDIUM_CONFIG }}
          envkey_RSSHUB_EMAIL_CONFIG: ${{ secrets.RSSHUB_EMAIL_CONFIG }}
          envkey_ICLOUDPD_USERNAME: ${{ vars.ICLOUDPD_USERNAME }}
          envkey_ICLOUDPD_PASSWORD: ${{ secrets.ICLOUDPD_PASSWORD }}
          envkey_ICLOUDPD_ALBUM: ${{ vars.ICLOUDPD_ALBUM }}
          file_name: .env
          fail_on_empty: false
          sort_keys: false
      - name: Upload .env via SSH
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: root
          key:  ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: ".env"
          target: ${{ vars.DEPLOY_PATH }}
      - name: Git pull deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            
            git fetch https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git ${{ github.ref_name }}
            git reset --hard FETCH_HEAD
            ./restart.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: rubycats-com/jarvis-report-action@main
        if: success() || failure()
        with:
          report-to: ${{ vars.DAPPS_TELEGRAM_CHAT }}
          token: ${{ secrets.DAPPS_TELEGRAM_TELEGRAM_TOKEN }}
