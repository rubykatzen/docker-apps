global:
  checkNewVersion: false
  sendAnonymousUsage: false
log:
  level: INFO # DEBUG, INFO, WARNING, ERROR, CRITICAL
accesslog: {}
  # format: common # common, json, logfmt
  # filePath: /var/log/traefik/access.log
api:
  dashboard: true
entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
          permanent: false
  https:
    address: ":443"
providers:
  docker:
    # endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik
    watch: true
certificatesResolvers:
  acmeDnsChallengeResolver:
    acme:
      email: ykirillov@icloud.com #{{env "ACME_EMAIL" }}
      storage: acme.json
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 0
