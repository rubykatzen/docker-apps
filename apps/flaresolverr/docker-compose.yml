include:
  - ../networks.yml
x-environment: &environment
  LOG_LEVEL: info
  TZ: ${APPS_TIMEZONE}
services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr
    extends:
      file: ../common.yml
      service: main
    expose:
      - 8191
    labels:
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=8191"
    environment: *environment
