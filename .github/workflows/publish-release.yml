name: Publish release
on:
  pull_request:
    types: [closed]
    branches: [main]
jobs:
  publish:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - uses: rubykatzen/releaser/.github/actions/read-release-data@v0.5
        id: meta
        with:
          branch: ${{ github.event.pull_request.head.ref }}
      - uses: rubykatzen/releaser/.github/actions/create-release@v0.5
        with:
          version: ${{ steps.meta.outputs.version }}
          notes: ${{ steps.meta.outputs.notes }}
  upload:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.publish.outputs.version }}
      - id: bundle
        uses: ./.github/actions/build-bundle
        with:
          bundle-name: docker-apps.zip
          paths: |
            apps
            ansible.cfg
            .env.example
            backup.sh
            deploy.sh
            down.sh
            generate-env.sh
            lib.sh
            logs.sh
            restart.sh
            up.sh
            README.md
      - run: gh release upload "v${{ needs.publish.outputs.version }}" "${{ steps.bundle.outputs.bundle-path }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
