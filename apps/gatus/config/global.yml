storage:
  type: postgres
  path: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
alerting:
  telegram:
    token: ${TELEGRAM_TOKEN}
    id: ${TELEGRAM_ID}
    default-alert:
      description: "[[🔴]] Service down"
      send-on-resolved: true
      failure-threshold: 1
      success-threshold: 1
