services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/clickhouse-server/config.d/config.xml << 'EOF'
        <clickhouse>
          <logger>
            <level>warning</level>
            <console>true</console>
          </logger>
          <keep_alive_timeout>10</keep_alive_timeout>
          <query_thread_log remove="remove"/>
          <query_log remove="remove"/>
          <text_log remove="remove"/>
          <trace_log remove="remove"/>
          <metric_log remove="remove"/>
          <asynchronous_metric_log remove="remove"/>
          <session_log remove="remove"/>
          <part_log remove="remove"/>
          <listen_host>0.0.0.0</listen_host>
          <interserver_listen_host>0.0.0.0</interserver_listen_host>
          <interserver_http_host>clickhouse</interserver_http_host>
          <macros>
            <shard>1</shard>
            <replica>replica1</replica>
          </macros>
        </clickhouse>
        EOF
        cat > /etc/clickhouse-server/users.d/user-config.xml << 'EOF'
        <clickhouse>
          <profiles>
            <default>
              <log_queries>0</log_queries>
              <log_query_threads>0</log_query_threads>
            </default>
          </profiles>
        </clickhouse>
        EOF
        cat > /docker-entrypoint-initdb.d/init-db.sh << EOF
        #!/bin/bash
        set -e
        clickhouse client -n <<-EOSQL
            CREATE DATABASE IF NOT EXISTS ${APP_NAME};
        EOSQL
        EOF
        chmod +x /docker-entrypoint-initdb.d/init-db.sh
        /entrypoint.sh
    volumes:
      - ../apps-data/${APP_NAME}/clickhouse/data:/var/lib/clickhouse
      - ../apps-data/${APP_NAME}/clickhouse/logs:/var/log/clickhouse-server
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8123/ping",
        ]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
