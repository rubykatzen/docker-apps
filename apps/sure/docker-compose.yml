include:
  - ../networks.yml
  - ../postgres-17.yml
  - ../redis-7.yml
x-environment: &environment
  SELF_HOSTED: true
  RAILS_FORCE_SSL: false
  RAILS_ASSUME_SSL: false
  SECRET_KEY_BASE: ${APPS_KEY_HEX_64}
  DB_HOST: postgres
  POSTGRES_DB: ${APP_NAME}
  POSTGRES_USER: ${APP_NAME}
  POSTGRES_PASSWORD: ${APPS_DATABASE_PASSWORD}
  REDIS_URL: redis://redis:6379/1
services:
  worker:
    image: ghcr.io/we-promise/sure
    extends:
      file: ../common.yml
      service: side
    volumes:
      - ../../apps-data/${APP_NAME}/storage:/rails/storage
    command: bundle exec sidekiq
    environment: *environment
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[s]idekiq' >/dev/null || exit 1"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 5
  web:
    image: ghcr.io/we-promise/sure
    extends:
      file: ../common.yml
      service: main
    expose:
      - 3000
    labels:
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=3000"
    volumes:
      - ../../apps-data/${APP_NAME}/storage:/rails/storage
    environment: *environment
    depends_on:
      - postgres
      - redis
