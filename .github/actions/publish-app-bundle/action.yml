name: Publish Docker Apps bundle
description: Build, verify, and publish a Docker Apps release bundle.
inputs:
  release-repo:
    description: GitHub repository to publish the release asset to.
    required: false
    default: ""
  bundle-name:
    description: Bundle archive filename.
    required: false
    default: docker-apps.zip
  paths:
    description: Newline-separated paths to include in the bundle.
    required: true
  token:
    description: Token with permission to write releases.
    required: true
  tag:
    description: Immutable release tag. Defaults to the first eight characters of GITHUB_SHA.
    required: false
    default: ""
  latest-tag:
    description: Mutable release tag to update after publishing. Set to an empty string to disable.
    required: false
    default: latest
  require-apps:
    description: Require at least one apps/<name>/docker-compose.yml in the bundle.
    required: false
    default: "true"
outputs:
  tag:
    description: Immutable release tag used for the publication.
    value: ${{ steps.publish.outputs.tag }}
  ref:
    description: Short release ref in owner/repo@tag format.
    value: ${{ steps.publish.outputs.ref }}
runs:
  using: composite
  steps:
    - name: Build bundle
      shell: bash
      env:
        BUNDLE_NAME: ${{ inputs.bundle-name }}
        PATHS: ${{ inputs.paths }}
      run: |
        set -euo pipefail
        mkdir -p .bundle
        mapfile -t bundle_paths <<< "$PATHS"
        filtered_paths=()
        for path in "${bundle_paths[@]}"; do
          [ -n "$path" ] || continue
          filtered_paths+=("$path")
        done
        zip -r ".bundle/$BUNDLE_NAME" \
          "${filtered_paths[@]}" \
          -x '*.DS_Store' \
          -x 'apps/*/.env'
    - name: Verify bundle
      shell: bash
      env:
        BUNDLE_NAME: ${{ inputs.bundle-name }}
        REQUIRE_APPS: ${{ inputs.require-apps }}
      run: |
        set -euo pipefail
        zipinfo -1 ".bundle/$BUNDLE_NAME" > .bundle/files.txt
        if grep -Eq '(^|/)(\.env|apps\.env)$|(^|/)(apps-data|backups)(/|$)' .bundle/files.txt; then
          echo "Bundle contains runtime state or env files" >&2
          grep -E '(^|/)(\.env|apps\.env)$|(^|/)(apps-data|backups)(/|$)' .bundle/files.txt >&2
          exit 1
        fi
        if [ "$REQUIRE_APPS" = "true" ] && ! grep -Eq '^apps/[^/]+/docker-compose\.yml$' .bundle/files.txt; then
          echo "Bundle does not contain any app docker-compose.yml files" >&2
          exit 1
        fi
    - name: Generate release notes
      id: release-notes
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REQUESTED_TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail
        tag="$REQUESTED_TAG"
        [ -z "$tag" ] && tag="${GITHUB_SHA:0:8}"
        prev_tag=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | grep -v "^${tag}$" | head -1 || true)
        if [ -n "$prev_tag" ]; then
          commits=$(git log "${prev_tag}..HEAD" --format="- %s" --no-merges | head -50)
        else
          commits=$(git log HEAD --format="- %s" --no-merges | head -50)
        fi
        notes=""
        if [ -n "$commits" ]; then
          payload=$(jq -n --arg commits "$commits" '{
            model: "gpt-4o-mini",
            messages: [{
              role: "user",
              content: ("You are writing a changelog entry for a self-hosted infrastructure release (Docker Compose apps and Ansible playbooks). Below are the git commits in this release. Write a concise 2-4 sentence summary in English. Write plain prose — no bullet points, no headers.\n\nCommits:\n" + $commits)
            }],
            max_tokens: 300
          }')
          response=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://models.inference.ai.azure.com/chat/completions" \
            -d "$payload" || true)
          notes=$(echo "$response" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)
        fi
        [ -z "$notes" ] && notes="$commits"
        printf '%s' "$notes" > .bundle/release-notes.md
    - name: Publish bundle
      id: publish
      shell: bash
      env:
        INPUT_RELEASE_REPO: ${{ inputs.release-repo }}
        DEFAULT_RELEASE_REPO: ${{ github.repository }}
        BUNDLE_NAME: ${{ inputs.bundle-name }}
        GH_TOKEN: ${{ inputs.token }}
        REQUESTED_TAG: ${{ inputs.tag }}
        LATEST_TAG: ${{ inputs.latest-tag }}
      run: |
        set -euo pipefail
        release_repo="$INPUT_RELEASE_REPO"
        if [ -z "$release_repo" ]; then
          release_repo="$DEFAULT_RELEASE_REPO"
        fi
        tag="$REQUESTED_TAG"
        if [ -z "$tag" ]; then
          tag="${GITHUB_SHA:0:8}"
        fi
        if gh release view "$tag" --repo "$release_repo" >/dev/null 2>&1; then
          gh release upload "$tag" ".bundle/$BUNDLE_NAME" --repo "$release_repo" --clobber
          echo "created=false" >> "$GITHUB_OUTPUT"
        else
          gh release create "$tag" ".bundle/$BUNDLE_NAME" \
            --repo "$release_repo" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes-file .bundle/release-notes.md \
            --latest=false
          echo "created=true" >> "$GITHUB_OUTPUT"
        fi
        if [ -n "$LATEST_TAG" ]; then
          if gh release view "$LATEST_TAG" --repo "$release_repo" >/dev/null 2>&1; then
            gh release upload "$LATEST_TAG" ".bundle/$BUNDLE_NAME" --repo "$release_repo" --clobber
            gh release edit "$LATEST_TAG" --repo "$release_repo" --target "$GITHUB_SHA"
          else
            gh release create "$LATEST_TAG" ".bundle/$BUNDLE_NAME" \
              --repo "$release_repo" \
              --target "$GITHUB_SHA" \
              --title "$LATEST_TAG" \
              --notes "Latest Docker Apps bundle"
          fi
        fi
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
        echo "ref=$release_repo@$tag" >> "$GITHUB_OUTPUT"
    - name: Update changelog
      if: steps.publish.outputs.created == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REQUESTED_TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail
        tag="$REQUESTED_TAG"
        [ -z "$tag" ] && tag="${GITHUB_SHA:0:8}"
        echo "$tag" | grep -Eq '^v[0-9]' || exit 0
        date=$(date -u +%Y-%m-%d)
        notes=$(cat .bundle/release-notes.md)
        new_entry="## [${tag}] - ${date}"$'\n\n'"${notes}"
        file_resp=$(curl -sf \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/CHANGELOG.md" || echo "{}")
        current_sha=$(echo "$file_resp" | jq -r '.sha // empty')
        current_content=$(echo "$file_resp" | jq -r '.content // empty' | base64 -d 2>/dev/null || echo "")
        if [ -n "$current_content" ]; then
          new_content="${new_entry}"$'\n\n'"${current_content}"
        else
          new_content="# Changelog"$'\n\n'"${new_entry}"
        fi
        update_payload=$(jq -n \
          --arg message "chore: update changelog for ${tag}" \
          --arg content "$(printf '%s' "$new_content" | base64 -w 0)" \
          --arg sha "$current_sha" \
          'if $sha == "" then {message: $message, content: $content} else {message: $message, content: $content, sha: $sha} end')
        curl -sf -X PUT \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/CHANGELOG.md" \
          -d "$update_payload" > /dev/null
