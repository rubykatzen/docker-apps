name: Publish
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
concurrency:
  group: publish-docker-apps
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: bundle
        uses: ./.github/actions/build-bundle
        with:
          bundle-name: docker-apps.zip
          paths: |
            apps
            ansible.cfg
            .env.example
            backup.sh
            deploy.sh
            down.sh
            generate-env.sh
            lib.sh
            logs.sh
            restart.sh
            up.sh
            README.md
      - uses: dupmachine/baseline/.github/actions/create-release@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          artifact-path: ${{ steps.bundle.outputs.bundle-path }}
