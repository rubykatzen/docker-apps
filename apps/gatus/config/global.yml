storage:
  type: postgres
  path: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
alerting:
  telegram:
    token: ${TELEGRAM_TOKEN}
    id: ${TELEGRAM_ID}
    title: ""
    default-alert:
      send-on-resolved: true
      failure-threshold: 1
      success-threshold: 1
ui: 
  dashboard-subheading: ""
  dark-mode: false
  default-sort-by: group
