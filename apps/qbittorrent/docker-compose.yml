services:
  qbittorrent:
    image: linuxserver/qbittorrent
    dns:
      - 8.8.8.8
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${DAPPS_TIMEZONE}
      - WEBUI_PORT=8133
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ../../apps-data/${APP_NAME}/media/torrents:/media/torrents
    expose:
      - 8133
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${APP_NAME}.${DAPPS_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}.tls.certresolver=acmeHttpChallengeResolver"
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=8133"
    networks:
      - traefik
networks:
  traefik:
    external: true
