x-environment: &environment
  PORT: 45876
  HEALTHCHECK_CMD: "nc -z 127.0.0.1 $${PORT} || exit 1"
  KEY: ${BESZEL_AGENT_PUBLIC_KEY}
services:
  beszel-agent:
    image: "henrygd/beszel-agent:alpine"
    extends:
      file: ../common.yml
      service: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home:/extra-filesystems/home:ro
    environment: *environment
    cap_add:
      - SYS_RAWIO # required for S.M.A.R.T. data
      - SYS_ADMIN # required for NVMe S.M.A.R.T. data
    devices:
      - ${BESZEL_DISK_1_DEVICE:-/dev/null}:${BESZEL_DISK_1_DEVICE:-/dev/null}
      - ${BESZEL_DISK_2_DEVICE:-/dev/null}:${BESZEL_DISK_2_DEVICE:-/dev/null}
    healthcheck:
      test: ["CMD", "/agent", "health"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 5
