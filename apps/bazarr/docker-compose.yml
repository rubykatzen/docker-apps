include:
  - ../networks.yml
x-environment: &environment
  PUID: ${APPS_UID}
  PGID: ${APPS_GID}
  TZ: ${APPS_TIMEZONE}
services:
  bazarr:
    image: ghcr.io/hotio/bazarr
    extends:
      file: ../common.yml
      service: main
    expose:
      - 6767
    labels:
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=6767"
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ${JELLYFIN_SHOWS_PATH}:/shows
      - ${JELLYFIN_VIDEO_PATH}:/video
