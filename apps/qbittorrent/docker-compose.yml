include:
  - ../networks.yml
x-environment: &environment
  PUID: ${APPS_UID}
  PGID: ${APPS_GID}
  TZ: ${APPS_TIMEZONE}
  WEBUI_PORT: 443
services:
  qbittorrent:
    extends:
      file: ../common.yml
      service: main
    expose:
      - 443
    labels:
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=443"
    image: linuxserver/qbittorrent
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ../../apps-data/${APP_NAME}/downloads:/downloads
