include:
  - ../networks.yml
services:
  grocy:
    extends:
      file: ../common.yml
      service: main
    image: lscr.io/linuxserver/grocy:latest
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${DAPPS_TIMEZONE}
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
