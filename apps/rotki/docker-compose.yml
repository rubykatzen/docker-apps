include:
  - ../networks.yml
x-environment: &environment
  TZ: ${DAPPS_TIMEZONE}
services:
  rotki:
    extends:
      file: ../common.yml
      service: main
    image: rotki/rotki:latest
    environment: *environment
    expose:
      - ${APP_PORT}
    volumes:
      - ../../apps-data/${APP_NAME}/data:/data
      - ../../apps-data/${APP_NAME}/logs:/logs
