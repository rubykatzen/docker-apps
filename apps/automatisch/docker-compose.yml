include:
  - ../networks.yml
  - ../postgres-17.yml
  - ../redis-7.yml
x-environment: &environment
  APP_ENV: production
  REDIS_HOST: redis
  POSTGRES_HOST: postgres
  POSTGRES_DATABASE: ${APP_NAME}
  POSTGRES_USERNAME: ${APP_NAME}
  POSTGRES_PASSWORD: ${APPS_DATABASE_PASSWORD}
  ENCRYPTION_KEY: ${APPS_KEY_HEX_32}
  WEBHOOK_SECRET_KEY: ${APPS_KEY_HEX_32}
  APP_SECRET_KEY: ${APPS_KEY_HEX_32}
  HOST: ${APP_NAME}.${APPS_DOMAIN}
  PROTOCOL: https
  PORT: 3000
x-volumes: &volumes
  - ../../apps-data/${APP_NAME}/storage:/automatisch/storage
services:
  automatisch:
    image: automatischio/automatisch
    extends:
      file: ../common.yml
      service: main
    expose:
      - 3000
    labels:
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=3000"
    depends_on:
      - postgres
      - redis
    environment: *environment
    volumes: *volumes
  worker:
    image: automatischio/automatisch
    depends_on:
      - postgres
      - redis
      - automatisch
    environment:
      <<: *environment
      WORKER: true
    volumes: *volumes
    networks:
      - internal
