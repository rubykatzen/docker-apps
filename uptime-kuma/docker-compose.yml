services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - 3001:3001
    volumes:
      - ./data:/app/data
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.`${NAME}`.rule=Host(`${NAME}.${DOMAIN}`)"
      - "traefik.http.routers.`${NAME}`.tls.certresolver=acmeHttpChallengeResolver"
      - "traefik.http.services.`${NAME}`.loadbalancer.server.port=3001"
networks:
  traefik:
    external: true
