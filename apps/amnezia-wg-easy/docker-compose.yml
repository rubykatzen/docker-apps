services:
  amnezia-wg-easy:
    extends:
      file: ../common.yml
      service: main
    image: ghcr.io/w0rng/amnezia-wg-easy
    volumes:
      - ../../apps-data/${APP_NAME}/wireguard:/etc/wireguard
    environment:
      WG_HOST: ${APP_NAME}.${DAPPS_DOMAIN}
      LANGUAGE: en
      PORT: 51821
      PASSWORD: ${DAPPS_ADMIN_DEFAULT_PASS}
      WG_PORT: 51820
      WG_DEFAULT_ADDRESS: "10.8.0.x"
      WG_DEFAULT_DNS: "1.1.1.1"
      WG_ALLOWED_IPS: "0.0.0.0/0, ::/0"
      WG_PERSISTENT_KEEPALIVE: 25
      WG_MTU: 1420
      DICEBEAR_TYPE: bottts
      USE_GRAVATAR: true
    ports:
      - "51820:51820/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    devices:
      - /dev/net/tun:/dev/net/tun
