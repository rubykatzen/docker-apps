include:
  - ../networks.yml
x-environment: &environment
  TZ: ${DAPPS_TIMEZONE}
services:
  wallos:
    image: bellamy/wallos
    extends:
      file: ../common.yml
      service: main
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/db:/var/www/html/db
      - ../../apps-data/${APP_NAME}/logos:/var/www/html/images/uploads/logos
