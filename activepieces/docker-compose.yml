services:
  postgres:
    image: 'postgres:latest'
    restart: unless-stopped
    environment:
      POSTGRES_DB: activepiecesdb
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_USER: activepieces
    volumes:
      - ./postgresql:/var/lib/postgresql/data
    networks:
      - internal
  redis:
    image: 'redis:latest'
    container_name: redis
    restart: unless-stopped
    volumes:
      - ./redis:/data
    networks:
      - internal
  activepieces:
    image: ghcr.io/activepieces/activepieces:latest
    container_name: activepieces
    restart: unless-stopped
    ## Enable the following line if you already use AP_EXECUTION_MODE with SANDBOXED or old activepieces, checking the breaking change documentation for more info.
    ## privileged: true
    environment:
      # It's advisable to consult the documentation and use the tools/deploy.sh to generate the passwords, keys, instead of manually filling them.
      AP_ENGINE_EXECUTABLE_PATH: dist/packages/engine/main.js
      ## Random Long Password (Optional for community edition)
      AP_API_KEY: ${ENCRYPTION_KEY_HEX_64}
      ## 256 bit encryption key, 32 hex character
      AP_ENCRYPTION_KEY: ${ENCRYPTION_KEY_HEX_16}
      ## JWT Secret
      AP_JWT_SECRET: ${SECRET_KEY}
      AP_ENVIRONMENT: prod
      AP_FRONTEND_URL: https://${NAME}.${DOMAIN}
      AP_WEBHOOK_TIMEOUT_SECONDS: 30
      AP_TRIGGER_DEFAULT_POLL_INTERVAL: 5
      AP_POSTGRES_USERNAME: activepieces
      AP_POSTGRES_PASSWORD: mysecretpassword
      AP_POSTGRES_DATABASE: activepiecesdb
      AP_POSTGRES_HOST: postgres
      AP_POSTGRES_PORT: 5432
      AP_EXECUTION_MODE: UNSANDBOXED
      AP_REDIS_HOST: redis
      AP_REDIS_PORT: 6379
      AP_FLOW_TIMEOUT_SECONDS: 600
      AP_TELEMETRY_ENABLED: true
      AP_TEMPLATES_SOURCE_URL: "https://cloud.activepieces.com/api/v1/flow-templates"
    expose:
      - 80
    depends_on:
      - postgres
      - redis
    volumes:
      - ./cache:/usr/src/app/cache
    networks:
      - internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${NAME}.rule=Host(`${NAME}.${DOMAIN}`)"
      - "traefik.http.routers.${NAME}.tls.certresolver=acmeHttpChallengeResolver"
      - "traefik.http.services.${NAME}.loadbalancer.server.port=80"
networks:
  internal:
  traefik:
    external: true
