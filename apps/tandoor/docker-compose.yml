include:
  - ../networks.yml
  - ../postgres-17.yml
x-environment: &environment
  SECRET_KEY: ${APPS_KEY_HEX_64}
  ALLOWED_HOSTS: ${APP_NAME}.${APPS_DOMAIN},127.0.0.1
  DB_ENGINE: django.db.backends.postgresql
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${APP_NAME}
  POSTGRES_USER: ${APP_NAME}
  POSTGRES_PASSWORD: ${APPS_DATABASE_PASSWORD}
  TZ: ${APPS_TIMEZONE}
services:
  tandoor:
    image: vabene1111/recipes
    extends:
      file: ../common.yml
      service: main
    expose:
      - 80
    labels:
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=80"
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/staticfiles:/opt/recipes/staticfiles
      - ../../apps-data/${APP_NAME}/mediafiles:/opt/recipes/mediafiles
    depends_on:
      - postgres
