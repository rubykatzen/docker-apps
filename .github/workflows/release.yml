name: Release
on:
  push:
    tags:
      - "v*"
concurrency:
  group: release-docker-apps
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: bundle
        uses: ./.github/actions/build-bundle
        with:
          bundle-name: docker-apps.zip
          paths: |
            apps
            ansible.cfg
            .env.example
            backup.sh
            deploy.sh
            down.sh
            generate-env.sh
            lib.sh
            logs.sh
            restart.sh
            up.sh
            README.md
      - uses: rubykatzen/baseline/.github/actions/create-release@v0.0.10
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          artifact-path: ${{ steps.bundle.outputs.bundle-path }}
