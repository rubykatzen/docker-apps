services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${APP_NAME}
      MYSQL_USER: ${APP_NAME}
      MYSQL_PASSWORD: ${DAPPS_DATABASE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DAPPS_DATABASE_PASSWORD}
    volumes:
      - ../apps-data/${APP_NAME}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      internal:
      databases:
        aliases:
          - ${APP_NAME}-mysql
