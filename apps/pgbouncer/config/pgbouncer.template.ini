[databases]
semaphore = host=semaphore-postgres port=5432 dbname=semaphore user=semaphore password=${DAPPS_DATABASE_PASSWORD}
gatus = host=gatus-postgres port=5432 dbname=gatus user=gatus password=${DAPPS_DATABASE_PASSWORD}
[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
pool_mode = transaction
max_client_conn = 2000
default_pool_size = 20
min_pool_size = 0
reserve_pool_size = 10
reserve_pool_timeout = 5
server_connect_timeout = 10
server_login_retry = 10
query_wait_timeout = 120
idle_transaction_timeout = 0
server_idle_timeout = 600
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
