include:
  - ../networks.yml
x-environment: &environment
  PUID: ${APPS_UID}
  PGID: ${APPS_GID}
  TZ: ${APPS_TIMEZONE}
services:
  radarr:
    image: ghcr.io/hotio/radarr
    extends:
      file: ../common.yml
      service: main
    expose:
      - 7878
    labels:
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=7878"
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ${DOWNLOADS_PATH}:/downloads
      - ${JELLYFIN_VIDEO_PATH}:/video
