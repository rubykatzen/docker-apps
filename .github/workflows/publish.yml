name: Publish
on:
  push:
    branches: ["main"]
  workflow_dispatch:
concurrency:
  group: publish-docker-apps
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/publish-app-bundle
        with:
          bundle-name: docker-apps.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
          paths: |
            apps
            .env.example
            backup.sh
            deploy.sh
            down.sh
            generate-env.sh
            lib.sh
            logs.sh
            restart.sh
            up.sh
            README.md
