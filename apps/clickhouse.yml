services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: unless-stopped
    volumes:
      - ../apps-data/${APP_NAME}/clickhouse/data:/var/lib/clickhouse
      - ../apps-data/${APP_NAME}/clickhouse/logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/clickhouse-server/config.d/custom.xml << 'EOF'
        <clickhouse>
          <logger>
            <level>warning</level>
            <console>true</console>
          </logger>
          <keep_alive_timeout>10</keep_alive_timeout>
          <query_thread_log remove="remove"/>
          <query_log remove="remove"/>
          <text_log remove="remove"/>
          <trace_log remove="remove"/>
          <metric_log remove="remove"/>
          <asynchronous_metric_log remove="remove"/>
          <session_log remove="remove"/>
          <part_log remove="remove"/>
          <listen_host>0.0.0.0</listen_host>
          <macros>
            <cluster>openpanel_cluster</cluster>
          </macros>
        </clickhouse>
        EOF
        cat > /etc/clickhouse-server/users.d/custom-users.xml << 'EOF'
        <clickhouse>
          <profiles>
            <default>
              <log_queries>0</log_queries>
              <log_query_threads>0</log_query_threads>
            </default>
          </profiles>
        </clickhouse>
        EOF
        /entrypoint.sh
    networks:
      - internal
