services:
  qbittorrent:
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    dns:
      - 8.8.8.8
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${DAPPS_TIMEZONE}
      - WEBUI_PORT=8133
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ../../apps-data/${APP_NAME}/media/torrents:/media/torrents
    expose:
      - 8133
    restart: unless-stopped
    networks:
      - kamal
networks:
  kamal:
    external: true
