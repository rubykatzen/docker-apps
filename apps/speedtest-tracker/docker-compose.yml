include:
  - ../networks.yml
x-environment: &environment
  PUID: ${APPS_UID}
  PGID: ${APPS_GID}
  APP_KEY: ${APPS_KEY_HEX_16}
  DB_CONNECTION: sqlite
  SPEEDTEST_SCHEDULE: "*/10 * * * *"
  SPEEDTEST_SERVERS: 60747
services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker
    extends:
      file: ../common.yml
      service: main
    expose:
      - 80
    labels:
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=80"
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
