include:
  - ../networks.yml
x-environment: &environment
  HOME: /home/node
  OPENCLAW_HOME: /home/node
  TERM: xterm-256color
  OPENCLAW_STATE_DIR: /home/node/.openclaw
  OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
  OPENCLAW_CONFIG_DIR: /home/node/.openclaw
  OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
  OPENCLAW_GATEWAY_TOKEN: ${DAPPS_KEY_HEX_32}
  OPENCLAW_DISABLE_BONJOUR: "1"
  TZ: ${DAPPS_TIMEZONE}
services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.5.20
    extends:
      file: ../common.yml
      service: main
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "${APP_PORT}", "--allow-unconfigured"]
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/config:/home/node/.openclaw
      - ../../apps-data/${APP_NAME}/workspace:/home/node/.openclaw/workspace
      - ../../apps-data/${APP_NAME}/auth:/home/node/.config/openclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:${APP_PORT}/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
