include:
  - ../networks.yml
x-environment: &environment
  COLLECTOR_CRON_SCHEDULE: "0 */3 * * *"
  SCRUTINY_NOTIFY_URLS: >
    ${APPS_SHOUTRRR_TELEGRAM_NOTIFICATION_URL}
services:
  scrutiny:
    image: ghcr.io/analogj/scrutiny:master-omnibus
    extends:
      file: ../common.yml
      service: main
    expose:
      - 8080
    labels:
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=8080"
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
    environment: *environment
    volumes:
      - /run/udev:/run/udev:ro
      - ../../apps-data/${APP_NAME}/config:/opt/scrutiny/config
      - ../../apps-data/${APP_NAME}/influxdb:/opt/scrutiny/influxdb
    devices:
      - "/dev/nvme0"
      - "/dev/sda"
