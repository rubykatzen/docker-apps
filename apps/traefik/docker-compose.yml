services:
  traefik:
    image: traefik
    restart: unless-stopped
    environment:
      ACME_EMAIL: ${DAPPS_ADMIN_MAIL}
      CF_DNS_API_TOKEN: ${DAPPS_CLOUDFLARE_DNS_API_TOKEN}
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - ../../apps-data/${APP_NAME}/acme.json:/acme.json
    networks:
      - traefik
networks:
  traefik:
    external: true
