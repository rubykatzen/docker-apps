include:
  - ../networks.yml
  - ../postgres.yml
  - ../redis.yml
services:
  infisical:
    extends:
      file: ../common.yml
      service: main
    image: infisical/infisical:latest-postgres
    depends_on:
      - postgres
      - redis
    environment:
      ENCRYPTION_KEY: ${DAPPS_KEY_HEX_16} # Required key for platform encryption/decryption ops
      AUTH_SECRET: ${DAPPS_KEY_HEX_32} # Required secrets to sign JWT tokens
      # Postgres
      POSTGRES_PASSWORD: ${DAPPS_DATABASE_PASSWORD}
      POSTGRES_USER:  ${APP_NAME}
      POSTGRES_DB:  ${APP_NAME}
      POSTGRES_HOST: postgres
      # Required
      DB_CONNECTION_URI: postgres://${APP_NAME}:${DAPPS_DATABASE_PASSWORD}@postgres:5432/${APP_NAME}
      # Redis
      REDIS_URL: redis://redis:6379
      # Website URL
      SITE_URL: https://${APP_NAME}.${DAPPS_DOMAIN}
      # Mail/SMTP
      SMTP_HOST:
      SMTP_PORT:
      SMTP_FROM_ADDRESS:
      SMTP_FROM_NAME:
      SMTP_USERNAME:
      SMTP_PASSWORD:
      # Integration. Optional only if integration is used
      CLIENT_ID_HEROKU:
      CLIENT_ID_VERCEL:
      CLIENT_ID_NETLIFY:
      CLIENT_ID_GITHUB:
      CLIENT_ID_GITHUB_APP:
      CLIENT_SLUG_GITHUB_APP:
      CLIENT_ID_GITLAB:
      CLIENT_ID_BITBUCKET:
      CLIENT_SECRET_HEROKU:
      CLIENT_SECRET_VERCEL:
      CLIENT_SECRET_NETLIFY:
      CLIENT_SECRET_GITHUB:
      CLIENT_SECRET_GITHUB_APP:
      CLIENT_SECRET_GITLAB:
      CLIENT_SECRET_BITBUCKET:
      CLIENT_SLUG_VERCEL:
      CLIENT_PRIVATE_KEY_GITHUB_APP:
      CLIENT_APP_ID_GITHUB_APP:
      SENTRY_DSN: # Sentry (optional) for monitoring errors
      NODE_ENV: production

