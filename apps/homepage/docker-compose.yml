include:
  - ../networks.yml
x-environment: &environment
  HOMEPAGE_ALLOWED_HOSTS: ${APP_NAME}.${APPS_DOMAIN}
services:
  homepage:
    image: ghcr.io/gethomepage/homepage
    extends:
      file: ../common.yml
      service: main
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/config:/app/config
