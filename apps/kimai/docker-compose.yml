include:
  - ../networks.yml
  - ../mysql.yml
x-environment: &environment
  ADMINMAIL: ${DAPPS_ADMIN_MAIL}
  ADMINPASS: ${DAPPS_ADMIN_DEFAULT_PASS}
  DATABASE_URL: mysql://${APP_NAME}:${DAPPS_DATABASE_PASSWORD}@mysql/${APP_NAME}
  PUID: ${DAPPS_UID}
  PGID: ${DAPPS_GID}
  TZ: ${DAPPS_TIMEZONE}
services:
  kimai:
    extends:
      file: ../common.yml
      service: main
    image: lscr.io/linuxserver/kimai
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
    environment: *environment
