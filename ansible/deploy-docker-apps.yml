- name: Deploy Docker Apps
  hosts: all
  become: true
  tasks:
    - name: Read Docker Apps GitHub token
      set_fact:
        docker_apps_github_token: "{{ lookup('env', 'DOCKER_APPS_GITHUB_TOKEN') }}"
      no_log: true
    - name: Require Docker Apps deploy variables
      assert:
        that:
          - docker_apps_app_ref is defined and docker_apps_app_ref | length > 0
          - docker_apps_env_ref is defined and docker_apps_env_ref | length > 0
          - docker_apps_extra_refs is defined
          - docker_apps_github_token | length > 0
          - docker_apps_path is defined and docker_apps_path | length > 0
          - docker_apps_keep_releases is defined
          - docker_apps_sops_age_key_file is defined and docker_apps_sops_age_key_file | length > 0
        fail_msg: "Set docker_apps_app_ref, docker_apps_env_ref, docker_apps_extra_refs, docker_apps_path, docker_apps_keep_releases, docker_apps_sops_age_key_file, and the DOCKER_APPS_GITHUB_TOKEN environment variable"
    - name: Apply Docker Apps paths
      set_fact:
        docker_apps_release_name: "{{ ansible_facts['date_time'].iso8601_basic_short }}"
        docker_apps_release_path: "{{ docker_apps_path }}/releases/{{ ansible_facts['date_time'].iso8601_basic_short }}"
        docker_apps_shared_path: "{{ docker_apps_path }}/shared"
        docker_apps_current_path: "{{ docker_apps_path }}/current"
    - name: Ensure Docker Apps directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ docker_apps_path }}"
        - "{{ docker_apps_path }}/releases"
        - "{{ docker_apps_shared_path }}"
    - block:
        - name: Create app package pull directory
          tempfile:
            state: directory
            suffix: docker-apps-package
          register: docker_apps_app_pull
        - name: Pull Docker Apps package
          shell: |
            set -euo pipefail
            ref={{ docker_apps_app_ref | quote }}
            out={{ docker_apps_app_pull.path | quote }}
            asset=docker-apps.tar.gz
            repo="${ref%@*}"
            tag="${ref#*@}"
            if [ "$repo" = "$ref" ] || [ -z "$repo" ] || [ -z "$tag" ]; then
              echo "Invalid release ref: $ref. Expected owner/repo@tag or owner/repo@tag:asset" >&2
              exit 1
            fi
            if [ "$tag" != "${tag%%:*}" ]; then
              asset="${tag#*:}"
              tag="${tag%%:*}"
            fi
            if [ -n "${DOCKER_APPS_GITHUB_TOKEN:-}" ]; then
              export GH_TOKEN="$DOCKER_APPS_GITHUB_TOKEN"
            fi
            gh release download "$tag" --repo "$repo" --pattern "$asset" --dir "$out"
            test -f "$out/$asset"
            if [ "$asset" != "docker-apps.tar.gz" ]; then
              cp "$out/$asset" "$out/docker-apps.tar.gz"
            fi
          args:
            executable: /bin/bash
          environment:
            DOCKER_APPS_GITHUB_TOKEN: "{{ docker_apps_github_token }}"
        - name: Require Docker Apps bundle
          stat:
            path: "{{ docker_apps_app_pull.path }}/docker-apps.tar.gz"
          register: docker_apps_bundle
        - name: Fail when Docker Apps bundle is missing
          fail:
            msg: "docker-apps.tar.gz was not found in {{ docker_apps_app_ref }}"
          when: not docker_apps_bundle.stat.exists
        - name: Recreate release directory
          file:
            path: "{{ docker_apps_release_path }}"
            state: absent
        - name: Ensure release directory
          file:
            path: "{{ docker_apps_release_path }}"
            state: directory
            mode: "0755"
        - name: Extract Docker Apps release
          unarchive:
            src: "{{ docker_apps_app_pull.path }}/docker-apps.tar.gz"
            dest: "{{ docker_apps_release_path }}"
            remote_src: true
        - name: Create extra packages pull directory
          tempfile:
            state: directory
            suffix: docker-apps-extra-packages
          register: docker_apps_extra_pull
          when: docker_apps_extra_refs | length > 0
        - name: Pull and merge extra app packages
          shell: |
            set -euo pipefail
            extra_root={{ docker_apps_extra_pull.path | quote }}
            release_apps={{ (docker_apps_release_path + '/apps') | quote }}
            download_release_ref() {
              ref="$1"
              out="$2"
              default_asset="$3"
              repo="${ref%@*}"
              tag="${ref#*@}"
              asset="$default_asset"
              if [ "$repo" = "$ref" ] || [ -z "$repo" ] || [ -z "$tag" ]; then
                echo "Invalid release ref: $ref. Expected owner/repo@tag or owner/repo@tag:asset" >&2
                exit 1
              fi
              if [ "$tag" != "${tag%%:*}" ]; then
                asset="${tag#*:}"
                tag="${tag%%:*}"
              fi
              gh release download "$tag" --repo "$repo" --pattern "$asset" --dir "$out"
              test -f "$out/$asset"
              echo "$out/$asset"
            }
            if [ -n "${DOCKER_APPS_GITHUB_TOKEN:-}" ]; then
              export GH_TOKEN="$DOCKER_APPS_GITHUB_TOKEN"
            fi
            {% for ref in docker_apps_extra_refs %}
            package_dir="$extra_root/{{ loop.index }}"
            mkdir -p "$package_dir/pull" "$package_dir/extract"
            bundle="$(download_release_ref {{ ref | quote }} "$package_dir/pull" docker-apps-extra.tar.gz)"
            tar -xzf "$bundle" -C "$package_dir/extract"
            if [ ! -d "$package_dir/extract/apps" ]; then
              echo "Extra package {{ ref }} does not contain apps/" >&2
              exit 1
            fi
            for app_path in "$package_dir/extract/apps"/*; do
              [ -d "$app_path" ] || continue
              app="$(basename "$app_path")"
              if [ -e "$release_apps/$app" ]; then
                echo "Extra app conflicts with an existing app: $app" >&2
                exit 1
              fi
              cp -a "$app_path" "$release_apps/"
            done
            {% endfor %}
          args:
            executable: /bin/bash
          environment:
            DOCKER_APPS_GITHUB_TOKEN: "{{ docker_apps_github_token }}"
          when: docker_apps_extra_refs | length > 0
        - name: Create env package pull directory
          tempfile:
            state: directory
            suffix: docker-apps-env-package
          register: docker_apps_env_pull
        - name: Pull encrypted env package
          shell: |
            set -euo pipefail
            ref={{ docker_apps_env_ref | quote }}
            out={{ docker_apps_env_pull.path | quote }}
            asset=
            repo="${ref%@*}"
            tag="${ref#*@}"
            if [ "$repo" = "$ref" ] || [ -z "$repo" ] || [ -z "$tag" ]; then
              echo "Invalid release ref: $ref. Expected owner/repo@tag or owner/repo@tag:asset" >&2
              exit 1
            fi
            if [ "$tag" != "${tag%%:*}" ]; then
              asset="${tag#*:}"
              tag="${tag%%:*}"
            fi
            if [ -z "$asset" ]; then
              asset="$tag.sops.env"
            fi
            if [ -n "${DOCKER_APPS_GITHUB_TOKEN:-}" ]; then
              export GH_TOKEN="$DOCKER_APPS_GITHUB_TOKEN"
            fi
            gh release download "$tag" --repo "$repo" --pattern "$asset" --dir "$out"
            test -f "$out/$asset"
            cp "$out/$asset" "$out/.sops.env"
          args:
            executable: /bin/bash
          environment:
            DOCKER_APPS_GITHUB_TOKEN: "{{ docker_apps_github_token }}"
        - name: Check encrypted env payload
          stat:
            path: "{{ docker_apps_env_pull.path }}/.sops.env"
          register: docker_apps_sops_env
        - name: Require encrypted env payload
          fail:
            msg: ".sops.env was not found in {{ docker_apps_env_ref }}"
          when: not docker_apps_sops_env.stat.exists
        - name: Decrypt env to shared file
          shell: >
            SOPS_AGE_KEY_FILE={{ docker_apps_sops_age_key_file | quote }}
            sops decrypt {{ (docker_apps_env_pull.path + '/.sops.env') | quote }}
            > {{ (docker_apps_shared_path + '/.env.tmp') | quote }}
          no_log: true
        - name: Set env file permissions
          file:
            path: "{{ docker_apps_shared_path }}/.env.tmp"
            mode: "0600"
        - name: Publish env file
          command:
            cmd: "mv {{ docker_apps_shared_path }}/.env.tmp {{ docker_apps_shared_path }}/.env"
        - name: Ensure shared apps-data directory
          file:
            path: "{{ docker_apps_shared_path }}/apps-data"
            state: directory
            mode: "0755"
        - name: Link shared files into release
          file:
            src: "{{ item.src }}"
            dest: "{{ item.dest }}"
            state: link
            force: true
          loop:
            - src: "{{ docker_apps_shared_path }}/.env"
              dest: "{{ docker_apps_release_path }}/.env"
            - src: "{{ docker_apps_shared_path }}/apps-data"
              dest: "{{ docker_apps_release_path }}/apps-data"
        - name: Switch current release
          file:
            src: "{{ docker_apps_release_path }}"
            dest: "{{ docker_apps_current_path }}"
            state: link
            force: true
        - name: Deploy Docker Apps
          command:
            cmd: ./deploy.sh
            chdir: "{{ docker_apps_current_path }}"
        - name: Find Docker Apps releases
          find:
            paths: "{{ docker_apps_path }}/releases"
            file_type: directory
            recurse: false
          register: docker_apps_releases
        - name: Remove old Docker Apps releases
          file:
            path: "{{ item.path }}"
            state: absent
          loop: "{{ (docker_apps_releases.files | sort(attribute='mtime', reverse=true))[docker_apps_keep_releases | int:] }}"
      always:
        - name: Remove app package pull directory
          file:
            path: "{{ docker_apps_app_pull.path }}"
            state: absent
          when: docker_apps_app_pull is defined and docker_apps_app_pull.path is defined
        - name: Remove env package pull directory
          file:
            path: "{{ docker_apps_env_pull.path }}"
            state: absent
          when: docker_apps_env_pull is defined and docker_apps_env_pull.path is defined
        - name: Remove extra packages pull directory
          file:
            path: "{{ docker_apps_extra_pull.path }}"
            state: absent
          when: docker_apps_extra_pull is defined and docker_apps_extra_pull.path is defined
