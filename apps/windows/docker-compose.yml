services:
  windows:
    image: dockurr/windows
    restart: unless-stopped
    stop_grace_period: 4m
    environment:
      VERSION: "11"
      CPU_CORES: "2"
      DISK_SIZE: "64G"
      USERNAME: "admin"
      PASSWORD: ${DAPPS_ADMIN_DEFAULT_PASS}
      LANGUAGE: "Russian"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ../../apps-data/${APP_NAME}/storage:/storage
