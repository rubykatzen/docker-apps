include:
  - ../networks.yml
  - ../postgres-18.yml
  - ../redis-8.yml
x-image: &image glitchtip/glitchtip
x-environment: &environment
  DATABASE_URL: postgresql://${APP_NAME}:${APPS_DATABASE_PASSWORD}@postgres:5432/${APP_NAME}
  REDIS_URL: redis://redis:6379
  SECRET_KEY: ${APPS_KEY_HEX_64}
  PORT: 8000
  EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
  GLITCHTIP_DOMAIN: https://${APP_NAME}.${APPS_DOMAIN}
  DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-noreply@${APPS_DOMAIN}}
  CELERY_WORKER_AUTOSCALE: "1,3"
services:
  web:
    image: *image
    extends:
      file: ../common.yml
      service: main
    expose:
      - 8000
    labels:
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=8000"
    command: ["sh", "-c", "./bin/run-migrate.sh && ./bin/start.sh"]
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/uploads:/code/uploads
    depends_on:
      - postgres
      - redis
  worker:
    image: *image
    extends:
      file: ../common.yml
      service: side
    command: ["./bin/run-celery-with-beat.sh"]
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/uploads:/code/uploads
    depends_on:
      - postgres
      - redis
      - web
