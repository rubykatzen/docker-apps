include:
  - ../networks.yml
  - ../postgres.yml
x-environment: &environment
  - CLICKHOUSE_DB=analytics
  - CLICKHOUSE_USER=default
  - CLICKHOUSE_PASSWORD=frog
  - CLICKHOUSE_HOST=http://clickhouse:8123
  - POSTGRES_USER=${APP_NAME}
  - POSTGRES_PASSWORD=${DAPPS_DATABASE_PASSWORD}
  - POSTGRES_DB=${APP_NAME}
  - POSTGRES_HOST=postgres
  - POSTGRES_PORT=5432
  - HOST_BACKEND_PORT="3001:3001"
  - HOST_CLIENT_PORT="3002:3002"
    # Required: Your domain and base URL
  - DOMAIN_NAME=${APP_NAME}.${DAPPS_DOMAIN}
  - BASE_URL=https://${APP_NAME}.${DAPPS_DOMAIN}
    # Required: Authentication secret (generate a random 32+ character string)
  - BETTER_AUTH_SECRET=${DAPPS_KEY_HEX_32}
    # Optional: Disable new user signups after creating admin account
    # Optional but recommended: Mapbox token for globe visualizations
    # MAPBOX_TOKEN=your_mapbox_token
  - DISABLE_SIGNUP=false
  - DISABLE_TELEMETRY=true
  - NODE_ENV=production
  - NEXT_PUBLIC_BACKEND_URL=https://${APP_NAME}.${DAPPS_DOMAIN}
  - NEXT_PUBLIC_DISABLE_SIGNUP=false
services:
  clickhouse:
    container_name: clickhouse
    image: clickhouse/clickhouse-server:25.4.2
    volumes:
      - ../../apps-data/${APP_NAME}/clickhouse:/var/lib/clickhouse
    configs:
      - source: clickhouse_network
        target: /etc/clickhouse-server/config.d/network.xml
      - source: clickhouse_json
        target: /etc/clickhouse-server/config.d/enable_json.xml
      - source: clickhouse_logging
        target: /etc/clickhouse-server/config.d/logging_rules.xml
      - source: clickhouse_user_logging
        target: /etc/clickhouse-server/config.d/user_logging.xml
    environment: *environment
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    expose:
      - 8123
    networks:
      - internal
  backend:
    image: ghcr.io/rybbit-io/rybbit-backend
    expose:
      - 3001
    environment: *environment
    depends_on:
      - clickhouse
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.${APP_NAME}-api.rule=Host(`${APP_NAME}.${DAPPS_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.${APP_NAME}-api.tls.certresolver=${DAPPS_CERTIFICATE_RESOLVER}
      - traefik.http.middlewares.${APP_NAME}-api-strip.stripprefix.prefixes=/api
      - traefik.http.routers.${APP_NAME}-api.middlewares=${APP_NAME}-api-strip
      - traefik.http.services.${APP_NAME}-api.loadbalancer.server.port=3001
    networks:
      - internal
      - traefik
  client:
    image: ghcr.io/rybbit-io/rybbit-client
    extends:
      file: ../common.yml
      service: main
    environment: *environment
    depends_on:
      - backend
configs:
  clickhouse_network:
    content: |
      <clickhouse>
          <listen_host>0.0.0.0</listen_host>
      </clickhouse>
  clickhouse_json:
    content: |
      <clickhouse>
          <settings>
              <enable_json_type>1</enable_json_type>
          </settings>
      </clickhouse>
  clickhouse_logging:
    content: |
      <clickhouse>
        <logger>
            <level>warning</level>
            <console>true</console>
        </logger>
        <query_thread_log remove="remove"/>
        <query_log remove="remove"/>
        <text_log remove="remove"/>
        <trace_log remove="remove"/>
        <metric_log remove="remove"/>
        <asynchronous_metric_log remove="remove"/>
        <session_log remove="remove"/>
        <part_log remove="remove"/>
        <latency_log remove="remove"/>
        <processors_profile_log remove="remove"/>
      </clickhouse>
  clickhouse_user_logging:
    content: |
      <clickhouse>
        <profiles>
          <default>
            <log_queries>0</log_queries>
            <log_query_threads>0</log_query_threads>
            <log_processors_profiles>0</log_processors_profiles>
          </default>
        </profiles>
      </clickhouse>
