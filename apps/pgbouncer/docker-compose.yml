include:
  - ../networks.yml
services:
  pgbouncer:
    image: edoburu/pgbouncer
    extends:
      file: ../common.yml
      service: side
    ports:
      - "${APPS_INTERNAL_IP}:6432:6432"
    volumes:
      - ../../apps-data/${APP_NAME}/config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ../../apps-data/${APP_NAME}/config/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    networks:
      - databases
