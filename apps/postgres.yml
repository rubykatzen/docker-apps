services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APP_NAME}
      POSTGRES_PASSWORD: ${DAPPS_DATABASE_PASSWORD}
      POSTGRES_USER: ${APP_NAME}
    volumes:
      - ../apps-data/${APP_NAME}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${APP_NAME}", "-U", "${APP_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      internal:
      databases:
        aliases:
          - ${APP_NAME}-postgres
