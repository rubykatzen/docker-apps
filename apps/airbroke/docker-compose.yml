include:
  - ../networks.yml
  - ../postgres-17.yml
x-environment: &environment
  DATABASE_URL: postgresql://${APP_NAME}:${APPS_DATABASE_PASSWORD}@postgres:5432/${APP_NAME}?connection_limit=8
  DIRECT_URL: postgresql://${APP_NAME}:${APPS_DATABASE_PASSWORD}@postgres:5432/${APP_NAME}
  AUTH_SECRET: ${APPS_KEY_HEX_64}
  AUTH_URL: https://${APP_NAME}.${APPS_DOMAIN}
  NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${APPS_KEY_HEX_32}
  AIRBROKE_CORS_ORIGINS: https://${APP_NAME}.${APPS_DOMAIN}
  NODE_ENV: production
  HOSTNAME: 0.0.0.0
services:
  airbroke:
    image: ghcr.io/icoretech/airbroke
    extends:
      file: ../common.yml
      service: main
    expose:
      - 3000
    labels:
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=3000"
    environment: *environment
    depends_on:
      - postgres
