include:
  - ../networks.yml
  - ../postgres.yml
  - ../redis.yml
x-image: &image glitchtip/glitchtip
x-environment: &environment
  DATABASE_URL: postgresql://${APP_NAME}:${DAPPS_DATABASE_PASSWORD}@postgres:5432/${APP_NAME}
  REDIS_URL: redis://redis:6379
  SECRET_KEY: ${DAPPS_KEY_HEX_64}
  PORT: ${APP_PORT}
  EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
  GLITCHTIP_DOMAIN: https://${APP_NAME}.${DAPPS_DOMAIN}
  DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-noreply@${DAPPS_DOMAIN}}
  CELERY_WORKER_AUTOSCALE: "1,3"
services:
  web:
    image: *image
    extends:
      file: ../common.yml
      service: main
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/uploads:/code/uploads
    depends_on:
      - postgres
      - redis
      - migrate
  worker:
    image: *image
    extends:
      file: ../common.yml
      service: side
    command: ["./bin/run-celery-with-beat.sh"]
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/uploads:/code/uploads
    depends_on:
      - postgres
      - redis
      - migrate
  migrate:
    image: *image
    extends:
      file: ../common.yml
      service: side
    command: ["./bin/run-migrate.sh"]
    environment: *environment
    depends_on:
      - postgres
      - redis
