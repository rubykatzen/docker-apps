include:
  - ../networks.yml
  - ../redis.yml
  - ../postgres.yml
  - ../timescale.yml
services:
  gateway:
    image: codecov/self-hosted-gateway:latest-stable
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      #- ${CODECOV_SSL_CERT-/cert/codecov.crt}:/etc/codecov/ssl/certs/cert.crt:ro # uncomment if using ssl
    ports:
      - "${CODECOV_PORT-8080}:8080"
      #- "${CODECOV_SSL_PORT-8443}:8443" # uncomment if using ssl
    environment:
      - CODECOV_GATEWAY_MINIO_ENABLED=true
      #- CODECOV_GATEWAY_SSL_ENABLED=true # uncomment if using ssl
    networks:
      - internal
    depends_on:
      - api
      - frontend
  frontend:
    image: codecov/self-hosted-frontend:latest-stable
    environment:
      - CODECOV_BASE_HOST=localhost:8080
      - CODECOV_API_HOST=localhost:8080
      - CODECOV_IA_HOST=localhost:8080
      - CODECOV_SCHEME=http
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
    ports:
      - "8080"
    networks:
      - internal
  api:
    image: codecov/self-hosted-api:latest-stable
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
    networks:
      - internal
    depends_on:
      - minio
      - timescale
      - postgres
      - redis
  worker:
    image: codecov/self-hosted-worker:latest-stable
    environment:
      - RUN_ENV=ENTERPRISE
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ../../apps-data/${APP_NAME}/archive-volume:/archive
    networks:
      - internal
    depends_on:
      - minio
      - redis
      - postgres
      - timescale
  minio: # ToDO: extract
    image: minio/minio:RELEASE.2020-04-15T00-39-01Z
    command: server /export
    ports:
      - "${CODECOV_MINIO_PORT-9000}:9000"
    environment:
      - MINIO_ACCESS_KEY=codecov-default-key
      - MINIO_SECRET_KEY=codecov-default-secret
    volumes:
      - ../../apps-data/${APP_NAME}/archive-volume:/export
    networks:
      - internal
