name: Discover manifest matrix
description: Build a GitHub Actions strategy matrix from files matching a glob pattern.
inputs:
  pattern:
    description: Glob pattern to match manifest files.
    required: true
outputs:
  matrix:
    description: JSON strategy matrix with a "manifest" key containing matched file paths.
    value: ${{ steps.matrix.outputs.matrix }}
runs:
  using: composite
  steps:
    - name: Build matrix
      id: matrix
      shell: bash
      env:
        PATTERN: ${{ inputs.pattern }}
      run: |
        set -euo pipefail
        matrix="$(find . -path "./$PATTERN" -not -path '*/.*' | sort | sed 's|^\./||' | jq -Rsc 'split("\n") | map(select(length > 0)) | {manifest: .}')"
        if [ "$(jq '.manifest | length' <<< "$matrix")" -eq 0 ]; then
          echo "No files found matching: $PATTERN" >&2
          exit 1
        fi
        echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
