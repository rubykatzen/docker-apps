services:
  qbittorrent:
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    dns:
      - 8.8.8.8
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${DAPPS_TIMEZONE}
      - WEBUI_PORT=443
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ../../apps-data/${APP_NAME}/downloads:/downloads
      - ../../apps-data/${APP_NAME}/incomplete_downloads:/incomplete_downloads
    expose:
      - 443
    restart: unless-stopped
    networks:
      - kamal
networks:
  kamal:
    external: true
