name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: New version without v prefix (e.g. 0.1.0)
        required: true
        type: string
      base_sha:
        description: Expected HEAD SHA of main
        required: true
        type: string
concurrency:
  group: release-docker-apps
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: rubykatzen/baseline/.github/actions/verify-release@v0.5.3
        with:
          base_sha: ${{ inputs.base_sha }}
      - uses: rubykatzen/baseline/.github/actions/generate-notes@v0.5.3
        id: notes
        with:
          version: ${{ inputs.version }}
      - uses: rubykatzen/baseline/.github/actions/commit-changelog@v0.5.3
        with:
          version: ${{ inputs.version }}
          notes: ${{ steps.notes.outputs.notes }}
      - uses: rubykatzen/baseline/.github/actions/create-release@v0.5.3
        with:
          version: ${{ inputs.version }}
          notes: ${{ steps.notes.outputs.notes }}
  upload:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ inputs.version }}
      - id: bundle
        uses: ./.github/actions/build-bundle
        with:
          bundle-name: docker-apps.zip
          paths: |
            apps
            ansible.cfg
            .env.example
            backup.sh
            deploy.sh
            down.sh
            generate-env.sh
            lib.sh
            logs.sh
            restart.sh
            up.sh
            README.md
      - run: gh release upload "v${{ inputs.version }}" "${{ steps.bundle.outputs.bundle-path }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
