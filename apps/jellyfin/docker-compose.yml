include:
  - ../networks.yml
x-environment: &environment
  TZ: ${DAPPS_TIMEZONE}
  JELLYFIN_PublishedServerUrl: https://${APP_NAME}.${DAPPS_DOMAIN}
services:
  jellyfin:
    image: jellyfin/jellyfin
    extends:
      file: ../common.yml
      service: main
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ../../apps-data/${APP_NAME}/cache:/cache
      - ../../apps-data/${APP_NAME}/media:/media
      - ${JELLYFIN_SHOWS_PATH}:/shows
      - ${JELLYFIN_VIDEO_PATH}:/video
