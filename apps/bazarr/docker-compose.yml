include:
  - ../networks.yml
x-environment: &environment
  PUID: ${DAPPS_UID}
  PGID: ${DAPPS_GID}
  TZ: ${DAPPS_TIMEZONE}
services:
  bazarr:
    image: ghcr.io/hotio/bazarr
    extends:
      file: ../common.yml
      service: main
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ${JELLYFIN_SHOWS_PATH}:/shows
      - ${JELLYFIN_VIDEO_PATH}:/video
