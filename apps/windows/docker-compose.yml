services:
  windows:
    image: dockurr/windows
    restart: unless-stopped
    stop_grace_period: 4m
    environment:
      VERSION: "11"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ../../apps-data/${APP_NAME}/storage:/storage
