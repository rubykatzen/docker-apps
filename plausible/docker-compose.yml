services:
    plausible_db:
        image: postgres:16-alpine
        restart: unless-stopped
        volumes:
            - ./postgresql:/var/lib/postgresql/data
        environment:
            - POSTGRES_PASSWORD=postgres
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            start_period: 1m
        networks:
            - internal
    plausible_events_db:
        image: clickhouse/clickhouse-server:24.3.3.102-alpine
        restart: unless-stopped
        volumes:
            - ./clickhouse:/var/lib/clickhouse
            - ./logs:/var/log/clickhouse-server
            - ./logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
            # This makes ClickHouse bind to IPv4 only, since Docker doesn't enable IPv6 in bridge networks by default.
            # Fixes "Listen [::]:9000 failed: Address family for hostname not supported" warnings.
            - ./ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
            # This makes ClickHouse consume less resources, which is useful for small setups.
            # https://clickhouse.com/docs/en/operations/tips#using-less-than-16gb-of-ram
            - ./low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
        ulimits:
            nofile:
                soft: 262144
                hard: 262144
        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
            start_period: 1m
        networks:
            - internal
    plausible:
        image: ghcr.io/plausible/community-edition
        restart: unless-stopped
        command: sh -c 'sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run'
        depends_on:
            plausible_db:
                condition: service_healthy
            plausible_events_db:
                condition: service_healthy
        volumes:
            - ./data:/var/lib/plausible
        environment:
            - TZ=${GENERIC_TIMEZONE}
            - TMPDIR=/var/lib/plausible/tmp
            # required: https://github.com/plausible/community-edition/wiki/configuration#required
            - BASE_URL=https://${NAME}.${DOMAIN}
            - SECRET_KEY_BASE=${SECRET_KEY}
            # optional: https://github.com/plausible/community-edition/wiki/configuration#optional
            # registration: https://github.com/plausible/community-edition/wiki/configuration#registration
            - TOTP_VAULT_KEY
            - DISABLE_REGISTRATION
            - ENABLE_EMAIL_VERIFICATION
            # web: https://github.com/plausible/community-edition/wiki/configuration#web
            - HTTP_PORT = 8000
            - HTTPS_PORT
            # databases: https://github.com/plausible/community-edition/wiki/configuration#database
            - DATABASE_URL
            - CLICKHOUSE_DATABASE_URL
            # Google: https://github.com/plausible/community-edition/wiki/configuration#google
            - GOOGLE_CLIENT_ID
            - GOOGLE_CLIENT_SECRET
            # geolocation: https://github.com/plausible/community-edition/wiki/configuration#ip-geolocation
            - IP_GEOLOCATION_DB
            - GEONAMES_SOURCE_FILE
            - MAXMIND_LICENSE_KEY
            - MAXMIND_EDITION
            # email: https://github.com/plausible/community-edition/wiki/configuration#email
            - MAILER_ADAPTER
            - MAILER_EMAIL
            - MAILER_NAME
            - SMTP_HOST_ADDR
            - SMTP_HOST_PORT
            - SMTP_USER_NAME
            - SMTP_USER_PWD
            - SMTP_HOST_SSL_ENABLED
            - POSTMARK_API_KEY
            - MAILGUN_API_KEY
            - MAILGUN_DOMAIN
            - MAILGUN_BASE_URI
            - MANDRILL_API_KEY
            - SENDGRID_API_KEY
        expose:
            - 8000
        networks:
            - internal
            - traefik
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.${NAME}.rule=Host(`${NAME}.${DOMAIN}`)"
            - "traefik.http.routers.${NAME}.tls.certresolver=acmeHttpChallengeResolver"
            - "traefik.http.services.${NAME}.loadbalancer.server.port=8000"
networks:
    internal:
    traefik:
        external: true
