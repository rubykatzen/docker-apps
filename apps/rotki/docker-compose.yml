include:
  - ../networks.yml
services:
  rotki:
    extends:
      file: ../common.yml
      service: main
    image: rotki/rotki:latest
    environment:
      TZ: ${DAPPS_TIMEZONE}
    expose:
      - ${APP_PORT}
    volumes:
      - ../../apps-data/${APP_NAME}/data:/data
      - ../../apps-data/${APP_NAME}/logs:/logs
