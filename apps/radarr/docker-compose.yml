include:
  - ../networks.yml
services:
  radarr:
    extends:
      file: ../common.yml
      service: main
    image: ghcr.io/hotio/radarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${DAPPS_TIMEZONE}
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ${QBITTORRENT_DOWNLOADS_PATH}:/downloads
      - ${JELLYFIN_VIDEO_PATH}:/video
