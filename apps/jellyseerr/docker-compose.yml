include:
  - ../networks.yml
  - ../postgres.yml
services:
  jellyseerr:
    extends:
      file: ../common.yml
      service: main
    image: fallenbagel/jellyseerr:latest
    depends_on:
      - postgres
    environment:
      TZ: ${DAPPS_TIMEZONE}
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: ${APP_NAME}
      DB_USER: ${APP_NAME}
      DB_PASS: ${DAPPS_DATABASE_PASSWORD}
      DB_NAME: ${APP_NAME}
      DB_LOG_QUERIES: 'false'
      DB_USE_SSL: 'false'
    volumes:
      - ../../apps-data/${APP_NAME}/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 5s
      interval: 30s
      retries: 5
