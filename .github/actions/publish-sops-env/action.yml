name: Publish SOPS env
description: Render an env manifest, encrypt it with SOPS age recipients, and publish it as a GitHub Release asset.
inputs:
  manifest:
    description: Path to the YAML env manifest.
    required: true
  release-repo:
    description: GitHub repository to publish the release asset to. Defaults to the current repository or manifest release_repo.
    required: false
    default: ""
  release-tag:
    description: Release tag to publish. Defaults to manifest release_tag or current repository name.
    required: false
    default: ""
  asset-name:
    description: Release asset name. Defaults to manifest release_asset or <manifest-stem>.sops.env.
    required: false
    default: ""
  keys-directory:
    description: Directory containing public age recipients named <key>.pub.
    required: false
    default: keys
  token:
    description: Token with permission to write releases.
    required: true
outputs:
  release-repo:
    description: GitHub repository used for publication.
    value: ${{ steps.publish.outputs.release_repo }}
  tag:
    description: Release tag used for publication.
    value: ${{ steps.publish.outputs.tag }}
  ref:
    description: Short release ref in owner/repo@tag format.
    value: ${{ steps.publish.outputs.ref }}
runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      env:
        SOPS_VERSION: "3.13.1"
      run: |
        python3 -m pip install --disable-pip-version-check --requirement "$GITHUB_ACTION_PATH/requirements.txt"
        mkdir -p "$RUNNER_TEMP/publish-sops-env/bin"
        curl --fail --location --silent --show-error \
          "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" \
          --output "$RUNNER_TEMP/publish-sops-env/bin/sops"
        chmod +x "$RUNNER_TEMP/publish-sops-env/bin/sops"
        echo "$RUNNER_TEMP/publish-sops-env/bin" >> "$GITHUB_PATH"
    - name: Render env
      id: render
      shell: bash
      env:
        MANIFEST: ${{ inputs.manifest }}
      run: |
        mkdir -p "$RUNNER_TEMP/publish-sops-env"
        python3 "$GITHUB_ACTION_PATH/scripts/render-env.py" \
          --manifest "$MANIFEST" \
          --output "$RUNNER_TEMP/publish-sops-env/plain.env"
    - name: Encrypt env
      shell: bash
      env:
        KEYS: ${{ steps.render.outputs.keys }}
        KEYS_DIRECTORY: ${{ inputs.keys-directory }}
      run: |
        recipients=""
        IFS=',' read -ra names <<< "$KEYS"
        for name in "${names[@]}"; do
          recipient="$(tr -d '[:space:]' < "$KEYS_DIRECTORY/${name}.pub")"
          if [[ ! "$recipient" =~ ^age1 ]]; then
            echo "Invalid age recipient: $KEYS_DIRECTORY/${name}.pub" >&2
            exit 1
          fi
          recipients="${recipients:+$recipients,}$recipient"
        done
        SOPS_AGE_RECIPIENTS="$recipients" sops encrypt \
          --input-type dotenv \
          --output-type dotenv \
          "$RUNNER_TEMP/publish-sops-env/plain.env" \
          > "$RUNNER_TEMP/publish-sops-env/.sops.env"
        rm "$RUNNER_TEMP/publish-sops-env/plain.env"
    - name: Publish release asset
      id: publish
      shell: bash
      env:
        INPUT_RELEASE_REPO: ${{ inputs.release-repo }}
        MANIFEST_RELEASE_REPO: ${{ steps.render.outputs.release_repo }}
        DEFAULT_RELEASE_REPO: ${{ github.repository }}
        DEFAULT_RELEASE_TAG: latest
        INPUT_RELEASE_TAG: ${{ inputs.release-tag }}
        MANIFEST_RELEASE_TAG: ${{ steps.render.outputs.release_tag }}
        INPUT_ASSET_NAME: ${{ inputs.asset-name }}
        MANIFEST_ASSET_NAME: ${{ steps.render.outputs.release_asset }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        release_repo="$INPUT_RELEASE_REPO"
        if [ -z "$release_repo" ]; then
          release_repo="$MANIFEST_RELEASE_REPO"
        fi
        if [ -z "$release_repo" ]; then
          release_repo="$DEFAULT_RELEASE_REPO"
        fi
        tag="$INPUT_RELEASE_TAG"
        if [ -z "$tag" ]; then
          tag="$MANIFEST_RELEASE_TAG"
        fi
        if [ -z "$tag" ]; then
          tag="$DEFAULT_RELEASE_TAG"
        fi
        asset_name="$INPUT_ASSET_NAME"
        if [ -z "$asset_name" ]; then
          asset_name="$MANIFEST_ASSET_NAME"
        fi
        asset_path="$RUNNER_TEMP/publish-sops-env/$asset_name"
        cp "$RUNNER_TEMP/publish-sops-env/.sops.env" "$asset_path"
        if gh release view "$tag" --repo "$release_repo" >/dev/null 2>&1; then
          gh release upload "$tag" "$asset_path" --repo "$release_repo" --clobber
        else
          gh release create "$tag" "$asset_path" \
            --repo "$release_repo" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes "Encrypted Docker Apps env for $tag"
        fi
        echo "release_repo=$release_repo" >> "$GITHUB_OUTPUT"
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
        echo "ref=$release_repo@$tag:$asset_name" >> "$GITHUB_OUTPUT"
    - name: Cleanup
      if: always()
      shell: bash
      run: rm -rf "$RUNNER_TEMP/publish-sops-env"
