include:
  - ../networks.yml
  - ../postgres-17.yml
x-environment: &environment
  SEMAPHORE_ACCESS_KEY_ENCRYPTION: ${APPS_KEY_HEX_16}
  SEMAPHORE_DB_DIALECT: postgres
  SEMAPHORE_DB_HOST: postgres
  SEMAPHORE_DB_NAME: ${APP_NAME}
  SEMAPHORE_DB_USER: ${APP_NAME}
  SEMAPHORE_DB_PASS: ${APPS_DATABASE_PASSWORD}
  SEMAPHORE_ADMIN: admin
  SEMAPHORE_ADMIN_PASSWORD: ${APPS_ADMIN_DEFAULT_PASS}
  SEMAPHORE_ADMIN_NAME: admin
  SEMAPHORE_ADMIN_EMAIL: ${APPS_ADMIN_MAIL}
  SEMAPHORE_TELEGRAM_ALERT: true
  SEMAPHORE_TELEGRAM_TOKEN: ${APPS_TELEGRAM_TELEGRAM_TOKEN}
  SEMAPHORE_TELEGRAM_CHAT: ${APPS_TELEGRAM_CHAT}
  ANSIBLE_HOST_KEY_CHECKING: false
services:
  semaphore:
    image: semaphoreui/semaphore
    extends:
      file: ../common.yml
      service: main
    environment: *environment
    depends_on:
      - postgres
