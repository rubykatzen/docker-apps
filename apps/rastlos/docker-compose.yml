include:
  - ../networks.yml
x-environment: &environment
  TZ: "${DAPPS_TIMEZONE}"
  CRON_EXPRESSION: "${RASTLOS_CRON_EXPRESSION:-0 * * * *}"
  PING_PROMPT: "Reply with one ASCII digit only: what is 2 plus 2?}"
  LOG_DIR: /data/logs
services:
  rastlos:
    image: ghcr.io/dupmachine/rastlos
    extends:
      file: ../common.yml
      service: side
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/data:/data
