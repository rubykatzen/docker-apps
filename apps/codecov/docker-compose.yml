include:
  - ../networks.yml
  - ../redis-7.yml
  - ../postgres-17.yml
  - ../timescale-17.yml
x-environment: &environment
  CODECOV_BASE_HOST: ${APP_NAME}.${DAPPS_DOMAIN}
  CODECOV_API_HOST: ${APP_NAME}.${DAPPS_DOMAIN}
  CODECOV_IA_HOST: ${APP_NAME}.${DAPPS_DOMAIN}
  CODECOV_SCHEME: https
  RUN_ENV: ENTERPRISE
x-volumes: &volumes
  - ../../apps-data/${APP_NAME}/config:/config
services:
  gateway:
    image: codecov/self-hosted-gateway:latest-stable
    extends:
      file: ../common.yml
      service: main
    depends_on:
      - api
      - frontend
    volumes: *volumes
  frontend:
    image: codecov/self-hosted-frontend:latest-stable
    extends:
      file: ../common.yml
      service: side
    environment: *environment
    volumes: *volumes
    expose:
      - "8080"
  api:
    image: codecov/self-hosted-api:latest-stable
    extends:
      file: ../common.yml
      service: side
    depends_on:
      - redis
      - postgres
      - timescale
    volumes: *volumes
  worker:
    image: codecov/self-hosted-worker:latest-stable
    extends:
      file: ../common.yml
      service: side
    depends_on:
      - redis
      - postgres
      - timescale
    environment: *environment
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
      - ../../apps-data/${APP_NAME}/archive:/archive
