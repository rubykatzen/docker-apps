services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker
    restart: unless-stopped
    expose:
      - 80
      - 443
    environment:
      - PUID=1000
      - PGID=1000
      - APP_KEY=${DAPPS_KEY_HEX_16}
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE='*/10 * * * *'
      - SPEEDTEST_SERVERS='55462,54504'
    volumes:
      - ../../apps-data/${APP_NAME}/config:/config
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${APP_NAME}.${DAPPS_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}.tls.certresolver=${DAPPS_CERTIFICATE_RESOLVER}"
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=80"
networks:
  traefik:
    external: true
