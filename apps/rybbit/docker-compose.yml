include:
  - ../networks.yml
  - ../postgres-18.yml
  - ../clickhouse-26.5.yml

x-environment: &environment
  NODE_ENV: production
  BASE_URL: https://${APP_NAME}.${DAPPS_DOMAIN}
  BETTER_AUTH_SECRET: ${DAPPS_KEY_HEX_32}
  DISABLE_SIGNUP: ${DAPPS_DISABLE_SIGNUP:-false}
  DISABLE_TELEMETRY: ${DAPPS_DISABLE_TELEMETRY:-true}
  MAPBOX_TOKEN: ${DAPPS_MAPBOX_TOKEN:-}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${APP_NAME}
  POSTGRES_USER: ${APP_NAME}
  POSTGRES_PASSWORD: ${DAPPS_DATABASE_PASSWORD}
  CLICKHOUSE_HOST: http://clickhouse:8123
  CLICKHOUSE_DB: ${APP_NAME}
  CLICKHOUSE_USER: ${APP_NAME}
  CLICKHOUSE_PASSWORD: ${DAPPS_DATABASE_PASSWORD}

services:
  client:
    image: ghcr.io/rybbit-io/rybbit-client
    extends:
      file: ../common.yml
      service: main
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_URL: https://${APP_NAME}.${DAPPS_DOMAIN}
      NEXT_PUBLIC_DISABLE_SIGNUP: ${DAPPS_DISABLE_SIGNUP:-false}
    depends_on:
      - backend

  backend:
    image: ghcr.io/rybbit-io/rybbit-backend
    extends:
      file: ../common.yml
      service: api
    expose:
      - 3001
    labels:
      - "traefik.http.services.${APP_NAME}-api.loadbalancer.server.port=3001"
    environment: *environment
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 5
